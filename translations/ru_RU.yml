# AdvancedAFK Языковой файл - Русский (RU)
# Русский перевод

prefix: "&8[&6AFK&8] "

# Широковещательные сообщения
afk-enter: "&e%player% &7теперь AFK%reason%"
afk-enter-reason: "&7: &f%reason%"
afk-exit: "&e%player% &7больше не AFK."

# Сообщения для AFK-игрока
afk-self-enter: "&aВы теперь AFK. Двигайте мышью, присядьте или взаимодействуйте, чтобы выйти."
afk-self-exit: "&eВы больше не AFK."

# Сообщения команд
cooldown: "&cВы должны подождать &e%seconds% &cсекунд, прежде чем использовать эту команду снова."
reload-success: "&aКонфигурация и языковые файлы перезагружены!"
no-permission: "&cУ вас нет разрешения на использование этой команды."
player-only: "&cЭта команда может быть использована только игроками."

# Формат времени
time-format: "%minutes%м %seconds%с"
